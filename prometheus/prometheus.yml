global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: healthchecks_monitoring
    metrics_path: /monitoring/metrics/
    static_configs:
      - targets:
          - 127.0.0.1:9000

  - job_name: node_exporter
    static_configs:
      - targets:
          - 127.0.0.1:9100

  - job_name: nginx_exporter
    static_configs:
      - targets:
          - 127.0.0.1:9113
